name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: test
        run: go test ./...
        env:
          GIT_AUTHOR_NAME: ci
          GIT_AUTHOR_EMAIL: ci@example.com
          GIT_COMMITTER_NAME: ci
          GIT_COMMITTER_EMAIL: ci@example.com
      - name: build
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              out="dist/jig_${tag}_${os}_${arch}"
              mkdir -p "$out"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
                go build -trimpath -ldflags "-s -w -X github.com/fvdsn/jig/internal/cli.buildVersion=${tag}" \
                -o "$out/jig" .
              cp LICENSE README.md "$out/"
              tar -czf "$out.tar.gz" -C dist "$(basename "$out")"
            done
          done
          (cd dist && shasum -a 256 *.tar.gz > checksums.txt)
      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt \
            --title "${GITHUB_REF_NAME}" --verify-tag --notes-from-tag
      - name: bump homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/fvdsn/homebrew-tap.git" tap
          .github/scripts/brew-formula.sh "$tag" dist/checksums.txt > tap/Formula/jig.rb
          cd tap
          git -c user.name=github-actions -c user.email=github-actions@github.com \
            commit -am "Bump jig to ${tag#v}"
          git push
